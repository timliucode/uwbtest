name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Compute version info from tag
        id: version
        run: |
          RAW_TAG="${GITHUB_REF_NAME}"
          VERSION_NAME="${RAW_TAG#v}"
          VERSION_CODE=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' | wc -l | tr -d ' ')
          echo "VERSION_NAME=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "VERSION_CODE=${VERSION_CODE}" >> "$GITHUB_OUTPUT"
          echo "RAW_TAG=${RAW_TAG}"           >> "$GITHUB_OUTPUT"
          echo "Computed: versionName=${VERSION_NAME}  versionCode=${VERSION_CODE}"

      - name: Decode keystore from secret
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/release.keystore"
          echo "KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"

      - name: Run unit tests
        env:
          RELEASE_VERSION_NAME: ${{ steps.version.outputs.VERSION_NAME }}
          RELEASE_VERSION_CODE: ${{ steps.version.outputs.VERSION_CODE }}
        run: ./gradlew testReleaseUnitTest --stacktrace

      - name: Build release AAB
        env:
          RELEASE_VERSION_NAME: ${{ steps.version.outputs.VERSION_NAME }}
          RELEASE_VERSION_CODE: ${{ steps.version.outputs.VERSION_CODE }}
          KEY_ALIAS:      ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:   ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: ./gradlew bundleRelease --stacktrace

      - name: Build release APK
        env:
          RELEASE_VERSION_NAME: ${{ steps.version.outputs.VERSION_NAME }}
          RELEASE_VERSION_CODE: ${{ steps.version.outputs.VERSION_CODE }}
          KEY_ALIAS:      ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:   ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Rename artifacts
        run: |
          VERSION="${{ steps.version.outputs.VERSION_NAME }}"
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/uwbtest-${VERSION}.apk
          mv app/build/outputs/bundle/release/app-release.aab \
             app/build/outputs/bundle/release/uwbtest-${VERSION}.aab

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.RAW_TAG }}
          name: "Release ${{ steps.version.outputs.VERSION_NAME }}"
          generate_release_notes: true
          files: |
            app/build/outputs/apk/release/uwbtest-${{ steps.version.outputs.VERSION_NAME }}.apk
            app/build/outputs/bundle/release/uwbtest-${{ steps.version.outputs.VERSION_NAME }}.aab
